version: 2
project_name: fdf
builds:
  - main: ./cli/cmd/fdf
    binary: fdf
    env: [CGO_ENABLED=0]
    ldflags: ["-s -w -X main.version={{.Version}}"]
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
release:
  draft: false
