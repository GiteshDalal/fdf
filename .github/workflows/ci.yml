name: ci
on:
  push: { branches: [main] }
  pull_request:
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26' }
      - run: go vet ./...
      - run: go test ./...
      - run: test -z "$(gofmt -l .)"
      - run: shellcheck install.sh
      - name: lint skill frontmatter
        run: |
          for f in skills/*/SKILL.md; do
            head -1 "$f" | grep -qx -- '---' && grep -q '^name:' "$f" && grep -q '^description:' "$f" \
              || { echo "bad skill frontmatter: $f"; exit 1; }
          done
